# Saru voice eval — model matrix
# soul: false → bare agent_stub (control)
# soul: true  → agent_stub + soul_wrapper + SOUL.md
#
# provider: anthropic | openrouter | openai
# For openrouter: set OPENROUTER_API_KEY env var
# For openai:     set base_url in the entry; set OPENAI_API_KEY if auth required
#
# NOTE: OpenRouter model IDs use the format {org}/{model}.
# Verify exact IDs at https://openrouter.ai/models before running.
# IDs below reflect what the user specified — update if OpenRouter slugs differ.

# ── Anthropic via OpenRouter ──────────────────────────────────────────────────

- codename: opus-control
  provider: openrouter
  model: anthropic/claude-opus-4.6
  soul: false

- codename: opus-soul
  provider: openrouter
  model: anthropic/claude-opus-4.6
  soul: true

- codename: sonnet-control
  provider: openrouter
  model: anthropic/claude-sonnet-4.6
  soul: false

- codename: sonnet-soul
  provider: openrouter
  model: anthropic/claude-sonnet-4.6
  soul: true

- codename: haiku-control
  provider: openrouter
  model: anthropic/claude-haiku-4.5
  soul: false

- codename: haiku-soul
  provider: openrouter
  model: anthropic/claude-haiku-4.5
  soul: true

# ── OpenAI via OpenRouter ─────────────────────────────────────────────────────

- codename: gpt5-control
  provider: openrouter
  model: openai/gpt-5.4
  soul: false

- codename: gpt5-soul
  provider: openrouter
  model: openai/gpt-5.4
  soul: true

